name: Regression

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: qa
        type: choice
        options: [dev, qa, prod]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cypress-tests:
    name: Regression — Shard ${{ matrix.shard }} / 4
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: 1
            spec: "cypress/e2e/api/login.cy.ts"
          - shard: 2
            spec: "cypress/e2e/api/products.cy.ts,cypress/e2e/api/users.cy.ts"
          - shard: 3
            spec: "cypress/e2e/ui/orders.cy.ts"
          - shard: 4
            spec: "cypress/e2e/ui/account-management.cy.ts"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Cypress tests (shard ${{ matrix.shard }})
        uses: cypress-io/github-action@v6
        with:
          command: npx cypress run --browser chrome --spec ${{ matrix.spec }} --env ENV=${{ inputs.environment }}
        env:
          CYPRESS_VALID_USER_EMAIL: ${{ secrets.VALID_USER_EMAIL }}
          CYPRESS_VALID_USER_PASSWORD: ${{ secrets.VALID_USER_PASSWORD }}
          CYPRESS_VALID_USER_NAME: ${{ secrets.VALID_USER_NAME }}

      - name: Make screenshot paths relative
        if: always()
        run: |
          [ -d cypress/reports/mocha ] && find cypress/reports/mocha -name "*.json" -exec sed -i "s|$(pwd)/||g" {} \; || true

      - name: Upload mocha results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mocha-results-shard-${{ matrix.shard }}
          path: cypress/reports/mocha/
          retention-days: 7

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-shard-${{ matrix.shard }}
          path: cypress/screenshots/
          retention-days: 7

  deploy-report:
    name: Deploy Report → /regression/
    runs-on: ubuntu-latest
    needs: cypress-tests
    if: always()
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download mocha results
        uses: actions/download-artifact@v4
        with:
          pattern: mocha-results-shard-*
          path: cypress/reports/mocha-raw/
          merge-multiple: false

      - name: Download screenshots
        uses: actions/download-artifact@v4
        with:
          pattern: screenshots-shard-*
          path: cypress/screenshots/
          merge-multiple: true

      - name: Generate HTML report
        run: |
          npx mochawesome-merge "cypress/reports/mocha-raw/**/*.json" -o cypress/reports/mochawesome.json
          npx tsx scripts/process-report.ts
          npx marge cypress/reports/mochawesome.json -f index -o cypress/reports/html --inline

      - name: Inject run metadata
        env:
          META_WORKFLOW: ${{ github.workflow }}
          META_ENV: ${{ inputs.environment }}
          META_BRANCH: ${{ github.ref_name }}
          META_ACTOR: ${{ github.actor }}
          META_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: npx tsx scripts/inject-metadata.ts

      - name: Deploy to GitHub Pages (/regression/)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: cypress/reports/html
          target-folder: regression
          clean: true
